name: Images

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag to publish, for example 0.1.1"
        required: true
        default: "dev"
      push_latest:
        description: "Also publish the latest tag"
        required: true
        type: boolean
        default: false

permissions:
  contents: read
  packages: write

concurrency:
  group: images-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: hi-heisenbug

jobs:
  publish:
    name: Build & Push GHCR Images
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: collector
            dockerfile: deploy/docker/collector.Dockerfile
          - name: sensor
            dockerfile: deploy/docker/sensor.Dockerfile

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags
        id: tags
        shell: bash
        run: |
          image="${REGISTRY}/${IMAGE_NAMESPACE}/${{ matrix.name }}"

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.tag }}"
            version="${version#v}"
            tags="${image}:${version}"
            if [[ "${{ inputs.push_latest }}" == "true" ]]; then
              tags="${tags}"$'\n'"${image}:latest"
            fi
          else
            version="${GITHUB_REF_NAME#v}"
            tags="${image}:${version}"$'\n'"${image}:latest"
          fi

          {
            echo "image=${image}"
            echo "tags<<EOF"
            echo "${tags}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Build and push ${{ matrix.name }}
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=Goodman ${{ matrix.name }}
            org.opencontainers.image.description=Runtime dependency security for package-attributed drift detection
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
