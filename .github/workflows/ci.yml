name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (branch or PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (Go + eBPF)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Install clang/LLVM and libbpf toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            llvm \
            libelf-dev \
            libbpf-dev

      - name: Set up Go 1.25
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: true

      - name: Compile eBPF object (make bpf)
        run: make bpf

      - name: Repository quality gate
        run: make quality

      - name: Shell and Python syntax
        run: |
          bash -n scripts/*.sh test/e2e/*.sh test/*.sh
          python3 -m py_compile scripts/merge-k8s-node-env.py demo_build/*.py

      - name: Run unit tests
        run: make test

      - name: Build binaries
        run: make build

      - name: Backend smoke test (no root)
        run: make smoke

      - name: Attack and integration replay corpus
        run: make replay

      - name: Portable setup contract (no root or make dependency)
        run: bash scripts/setup-everything.sh demo --check

      - name: Cross-build portable demo for macOS and Windows
        run: make portable-cross-build

  portable-docker-demo:
    name: Portable Docker Demo
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Build self-contained demo image
        run: docker build -f deploy/docker/demo.Dockerfile -t goodman/demo:ci .

      - name: Verify demo, OpenClaw alert, and complete export
        run: docker run --rm goodman/demo:ci -check -port 8844

  dashboard:
    name: Dashboard Build (Node)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Audit dashboard dependencies
        working-directory: dashboard
        run: npm audit --audit-level=moderate

      - name: Verify build output exists
        working-directory: dashboard
        run: test -f dist/index.html

  demo-video:
    name: Demo Video Workspace
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node 22
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: demo_build/package-lock.json

      - name: Install dependencies
        working-directory: demo_build
        run: npm ci

      - name: Audit dependencies
        working-directory: demo_build
        run: npm audit --audit-level=moderate

      - name: Test, lint, and bundle compositions
        working-directory: demo_build
        run: npm run check

  helm:
    name: Helm Chart Lint & Template
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Lint chart
        run: helm lint deploy/helm/goodman

      - name: Render templates
        run: helm template goodman deploy/helm/goodman
