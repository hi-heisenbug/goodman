name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref (branch or PR).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test (Go + eBPF)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Install clang/LLVM and libbpf toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            clang \
            llvm \
            libelf-dev \
            libbpf-dev

      - name: Set up Go 1.23
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - name: Compile eBPF object (make bpf)
        run: make bpf

      - name: Go vet
        run: make vet

      - name: Run unit tests
        run: make test

      - name: Build binaries
        run: make build

      - name: Backend smoke test (no root)
        run: make smoke

  dashboard:
    name: Dashboard Build (Node)
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Build dashboard
        working-directory: dashboard
        run: npm run build

      - name: Verify build output exists
        working-directory: dashboard
        run: test -f dist/index.html

  helm:
    name: Helm Chart Lint & Template
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Lint chart
        run: helm lint deploy/helm/goodman

      - name: Render templates
        run: helm template goodman deploy/helm/goodman
