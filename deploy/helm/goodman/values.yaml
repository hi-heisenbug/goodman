# Goodman Helm values. Fast install from a checkout:
#   scripts/install-k8s.sh --cluster prod

# Free-form deployment identity (shown in the UI / used for multi-cluster later).
cluster: dev
# Comma-separated registries this deployment watches (informational in v1).
registries: npm

sensor:
  image: ghcr.io/hi-heisenbug/sensor:0.1.0
  imagePullPolicy: IfNotPresent
  # Extra process comm names to watch beyond the built-in runtime defaults.
  extraComms: ""
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: 500m, memory: 512Mi }
  # metrics port for Prometheus scraping
  metricsPort: 9478

collector:
  image: ghcr.io/hi-heisenbug/collector:0.1.0
  imagePullPolicy: IfNotPresent
  replicas: 1
  service:
    type: ClusterIP
    port: 8844
  resources:
    requests: { cpu: 50m, memory: 128Mi }
    limits: { cpu: "1", memory: 512Mi }
  # Serve the collector API over HTTPS from a kubernetes.io/tls Secret
  # (keys tls.crt / tls.key). When the Secret also carries ca.crt, sensors
  # automatically trust it. Empty = plain HTTP inside the cluster.
  tls:
    secretName: ""

# Bearer-token authentication for the collector API.
#   ingest-token: required from sensors on POST /v1/events
#   api-token:    required from the dashboard, goodmanctl, and API clients
# Tokens are generated on first install and stay stable across upgrades.
# Set explicit values to override, or point existingSecret at a Secret that
# already has both keys.
auth:
  enabled: true
  ingestToken: ""
  apiToken: ""
  existingSecret: ""

# Forward alerts to a webhook (Slack-compatible or generic JSON POST).
notifications:
  webhookUrl: ""            # empty = disabled
  format: generic           # generic | slack
  minSeverity: WARN         # INFO | WARN | CRITICAL
  token: ""                 # optional bearer token sent to the webhook

# Prune resolved alerts older than this Go duration (e.g. 720h = 30 days).
# Empty keeps resolved alerts forever. Open/acknowledged alerts are never pruned.
retention: ""

# Datastore. Provide a Postgres DSN in production; the default embedded SQLite
# file is fine for a pilot / kind cluster (data lives on the collector pod).
postgres:
  dsn: ""                       # e.g. postgres://user:pass@host:5432/goodman?sslmode=require
  # When dsn is empty the collector uses this SQLite path on an emptyDir.
  sqlitePath: /data/goodman.db

# Learning window before a fingerprint is promoted to a baseline.
learningWindow:
  obsCount: 500
  minAgeHours: 24

# Attribution tier: "perfmap" (Tier 1, needs NODE_OPTIONS below) or
# "v8native" (Tier 2, not built in v1).
attribution:
  tier: perfmap
  # If true, document that workloads need NODE_OPTIONS injected. A mutating
  # webhook to auto-inject is a v1.1 item (deploy/helm placeholder only).
  requireNodeOptions: true

# High-risk rules override (JSON). Empty = built-in defaults (secret read,
# cloud-metadata, new outbound connect, new exec).
rules: ""

rbac:
  create: true
