{{- if gt (int .Values.collector.replicas) 1 }}
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: {{ .Release.Name }}-collector
  labels: {{- include "goodman.labels" . | nindent 4 }}
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: goodman
      app.kubernetes.io/component: collector
{{- end }}
