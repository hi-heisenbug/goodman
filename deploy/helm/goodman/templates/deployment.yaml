{{- if and (gt (int .Values.collector.replicas) 1) (not .Values.postgres.dsn) }}
{{- fail "collector.replicas > 1 requires postgres.dsn (SQLite is single-replica only)" }}
{{- end }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-collector
  labels: {{- include "goodman.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.collector.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: goodman
      app.kubernetes.io/component: collector
  template:
    metadata:
      labels:
        app.kubernetes.io/name: goodman
        app.kubernetes.io/component: collector
    spec:
{{- if gt (int .Values.collector.replicas) 1 }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    app.kubernetes.io/name: goodman
                    app.kubernetes.io/component: collector
{{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        fsGroupChangePolicy: OnRootMismatch
      containers:
        - name: collector
          image: {{ .Values.collector.image | quote }}
          imagePullPolicy: {{ .Values.collector.imagePullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          args:
            - -listen=:{{ .Values.collector.service.port }}
            - -dsn=$(GOODMAN_DSN)
            - -learn-obs=$(GOODMAN_LEARN_OBS)
            - -learn-min-age=$(GOODMAN_LEARN_MIN_AGE)
{{- if .Values.rules }}
            - -rules=/etc/goodman/rules.json
{{- end }}
{{- if .Values.webhook.enabled }}
            - -admission-listen=:{{ .Values.webhook.port }}
            - -admission-tls-cert=/etc/goodman/webhook-tls/tls.crt
            - -admission-tls-key=/etc/goodman/webhook-tls/tls.key
{{- end }}
          env:
            - name: GOODMAN_DSN
              value: {{ include "goodman.collectorDSN" . | quote }}
            - name: GOODMAN_HA_REPLICAS
              value: {{ .Values.collector.replicas | quote }}
            - name: GOODMAN_LEARN_OBS
              valueFrom: { configMapKeyRef: { name: {{ .Release.Name }}-config, key: learn_obs } }
            - name: GOODMAN_LEARN_MIN_AGE
              valueFrom: { configMapKeyRef: { name: {{ .Release.Name }}-config, key: learn_min_age } }
{{- if .Values.auth.enabled }}
            - name: GOODMAN_INGEST_TOKEN
              valueFrom: { secretKeyRef: { name: {{ include "goodman.authSecretName" . }}, key: ingest-token } }
            - name: GOODMAN_API_TOKEN
              valueFrom: { secretKeyRef: { name: {{ include "goodman.authSecretName" . }}, key: api-token } }
{{- end }}
{{- if .Values.collector.tls.secretName }}
            - name: GOODMAN_TLS_CERT
              value: /etc/goodman/tls/tls.crt
            - name: GOODMAN_TLS_KEY
              value: /etc/goodman/tls/tls.key
{{- end }}
{{- if .Values.notifications.webhookUrl }}
            - name: GOODMAN_WEBHOOK_URL
              value: {{ .Values.notifications.webhookUrl | quote }}
            - name: GOODMAN_WEBHOOK_FORMAT
              value: {{ .Values.notifications.format | quote }}
            - name: GOODMAN_WEBHOOK_MIN_SEVERITY
              value: {{ .Values.notifications.minSeverity | quote }}
{{- if .Values.notifications.digestInterval }}
            - name: GOODMAN_DIGEST_INTERVAL
              value: {{ .Values.notifications.digestInterval | quote }}
            - name: GOODMAN_DIGEST_ALERT_BUDGET
              value: {{ .Values.notifications.digestAlertBudget | default 5 | quote }}
{{- end }}
{{- if .Values.notifications.token }}
            - name: GOODMAN_WEBHOOK_TOKEN
              valueFrom: { secretKeyRef: { name: {{ include "goodman.authSecretName" . }}, key: webhook-token } }
{{- end }}
{{- end }}
{{- if .Values.publicUrl }}
            - name: GOODMAN_PUBLIC_URL
              value: {{ .Values.publicUrl | quote }}
{{- end }}
{{- if .Values.reachability.interval }}
            - name: GOODMAN_REACHABILITY_INTERVAL
              value: {{ .Values.reachability.interval | quote }}
{{- if .Values.reachability.osv }}
            - name: GOODMAN_REACHABILITY_OSV
              value: "true"
{{- end }}
{{- end }}
{{- if .Values.retention }}
            - name: GOODMAN_RETENTION
              value: {{ .Values.retention | quote }}
{{- end }}
          ports:
            - name: http
              containerPort: {{ .Values.collector.service.port }}
{{- if .Values.webhook.enabled }}
            - name: webhook
              containerPort: {{ .Values.webhook.port }}
{{- end }}
          readinessProbe:
            httpGet:
              path: /v1/readyz
              port: http
{{- if .Values.collector.tls.secretName }}
              scheme: HTTPS
{{- end }}
            initialDelaySeconds: 2
          livenessProbe:
            httpGet:
              path: /v1/healthz
              port: http
{{- if .Values.collector.tls.secretName }}
              scheme: HTTPS
{{- end }}
            initialDelaySeconds: 5
          resources: {{- toYaml .Values.collector.resources | nindent 12 }}
          volumeMounts:
            - name: data
              mountPath: /data
{{- if .Values.rules }}
            - name: config
              mountPath: /etc/goodman
{{- end }}
{{- if .Values.collector.tls.secretName }}
            - name: tls
              mountPath: /etc/goodman/tls
              readOnly: true
{{- end }}
{{- if .Values.webhook.enabled }}
            - name: webhook-tls
              mountPath: /etc/goodman/webhook-tls
              readOnly: true
{{- end }}
      volumes:
        - name: data
{{- if and .Values.store.persistence.enabled (not .Values.postgres.dsn) (le (int .Values.collector.replicas) 1) }}
{{- if .Values.store.persistence.existingClaim }}
          persistentVolumeClaim:
            claimName: {{ .Values.store.persistence.existingClaim | quote }}
{{- else }}
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-collector-data
{{- end }}
{{- else }}
          emptyDir: {}
{{- end }}
{{- if .Values.rules }}
        - name: config
          configMap:
            name: {{ .Release.Name }}-config
            items:
              - key: rules.json
                path: rules.json
{{- end }}
{{- if .Values.collector.tls.secretName }}
        - name: tls
          secret:
            secretName: {{ .Values.collector.tls.secretName }}
{{- end }}
{{- if .Values.webhook.enabled }}
        - name: webhook-tls
          secret:
            secretName: {{ .Release.Name }}-webhook-tls
{{- end }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ .Release.Name }}-collector
  labels: {{- include "goodman.labels" . | nindent 4 }}
spec:
  type: {{ .Values.collector.service.type }}
  selector:
    app.kubernetes.io/name: goodman
    app.kubernetes.io/component: collector
  ports:
    - name: http
      port: {{ .Values.collector.service.port }}
      targetPort: http
