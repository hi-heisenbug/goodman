{{- if and .Values.auth.enabled (not .Values.auth.existingSecret) }}
{{/*
Tokens are stable across upgrades: an existing Secret's values are reused,
explicit .Values override, and only a first install generates random tokens.
(`helm template` cannot lookup, so offline renders regenerate; installs don't.)
*/}}
{{- $existing := lookup "v1" "Secret" .Release.Namespace (printf "%s-auth" .Release.Name) | default dict }}
{{- $data := $existing.data | default dict }}
{{- $ingest := "" }}
{{- if .Values.auth.ingestToken }}{{ $ingest = .Values.auth.ingestToken | b64enc }}
{{- else if index $data "ingest-token" }}{{ $ingest = index $data "ingest-token" }}
{{- else }}{{ $ingest = randAlphaNum 40 | b64enc }}{{ end }}
{{- $api := "" }}
{{- if .Values.auth.apiToken }}{{ $api = .Values.auth.apiToken | b64enc }}
{{- else if index $data "api-token" }}{{ $api = index $data "api-token" }}
{{- else }}{{ $api = randAlphaNum 40 | b64enc }}{{ end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-auth
  labels: {{- include "goodman.labels" . | nindent 4 }}
type: Opaque
data:
  ingest-token: {{ $ingest }}
  api-token: {{ $api }}
{{- if .Values.notifications.token }}
  webhook-token: {{ .Values.notifications.token | b64enc }}
{{- end }}
{{- end }}
